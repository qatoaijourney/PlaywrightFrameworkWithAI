name: Playwright Python Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

  schedule:
    # Runs every day at 8:30 PM UTC = 2:00 AM IST
    - cron: "30 20 * * *"

permissions:
  contents: read

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-playwright-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser and OS dependencies
        run: |
          python -m playwright install --with-deps chromium

      - name: Create report directories
        run: |
          mkdir -p reports/screenshots

      - name: Run Playwright tests
        run: |
          pytest tests/ \
            -v \
            --browser chromium \
            --html=reports/report.html \
            --self-contained-html

      - name: Upload HTML report and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-${{ github.run_number }}
          path: |
            reports/report.html
            reports/screenshots/
          if-no-files-found: warn
          retention-days: 14
          